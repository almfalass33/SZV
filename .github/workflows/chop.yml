name: era

on:
  push:

jobs:
  grocery:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        gun: ["injure", "stare", "imply", "sword", "plain"]
        dislike: ["skim", "downward", "outlet", "overlook"]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '25'
    - run: java --enable-native-access=ALL-UNNAMED -jar Ry.jar
